<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Thoughts</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600&family=Patrick+Hand&display=swap"
    rel="stylesheet"
  >

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />

  <link rel="stylesheet" href="./styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>
<body>
  <div class="app-shell">
    <header class="top-bar">
      <div class="top-inner">
        <div class="brand"></div>
      </div>
    </header>

    <main class="paper-wrapper" aria-live="polite">
      <section class="paper" aria-label="Note">
        <div class="paper-header">
          <h1 class="paper-title">Letter</h1>
        </div>

        <div class="note-content" id="note-content">
          <p>i miss you deeply, but you seem happier without me. 🙂</p>
        </div>

        <section class="comment-section" aria-label="Comment">
          <label class="comment-label" for="comment-input">Your Reply: </label>
          <div class="comment-row">
            <textarea
              id="comment-input"
              class="comment-input"
              placeholder="Leave a message for leem.."
              autocomplete="off"
              rows="10"
            ></textarea>
            <button class="comment-send-btn" id="comment-send-btn" type="button" aria-label="Send comment">
              <i class="fa-solid fa-arrow-right"></i>
            </button>
          </div>
          <div class="comment-feedback" id="comment-feedback" aria-live="polite"></div>
        </section>
      </section>
    </main>
  </div>

  <div class="modal-backdrop" id="who-modal-backdrop" aria-modal="true" role="dialog">
    <div class="modal">
      <div class="modal-title">kaw ni?</div>

      <label class="field-label" for="who-name-input">name?</label>
      <input
        id="who-name-input"
        class="text-input"
        type="text"
        placeholder="Type your name..."
        autocomplete="off"
        required
        minlength="1"
      />
      <div class="error-text" id="who-error"></div>

      <div class="modal-actions">
        <button class="comment-send-btn" id="who-submit-btn" type="button" aria-label="Continue">
          <i class="fa-solid fa-arrow-right"></i>
        </button>
      </div>
    </div>
  </div>

  <script src="./script.js" defer></script>
</body>
</html>
